<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* overflow-x: hidden; */
        }

        section {
            width: 100%;
            height: 100vh;
            /* border: solid; */
            position: relative;
        }

        section .container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 40%;
            aspect-ratio: 1/1;
            border: solid;
        }


        .face {
            background-color: yellow;
            border-radius: 100%;
            width: 100%;
            aspect-ratio: 1/1;
            position: relative;
        }

        .eye1,
        .eye2 {
            padding: 4rem;
            border-radius: 100%;
            background-color: black;
            position: absolute;
        }

        .eye1 {
            top: 30%;
            left: 20%;
            /* transform: translate(-50%, -50%); */
        }

        .eye2 {
            top: 30%;
            left: 60%;
            /* transform: translate(-50%, -50%); */
        }

        .smile {
            position: absolute;
            padding: 2rem;
            border-radius: 10% 10% 100% 100%;
            background-color: orange;
            width: 60%;
            height: 3rem;
            left: 50%;
            transform: translateX(-50%);
            top: 60%;
        }

        .face:hover .smile {
            height: 6rem;
            transition: 1s;
        }

        p {
            padding: 1rem;
            background-color: red;
            font-size: 2rem;
            display: inline;
            border-radius: 10%;
            position: absolute;
            left: 0;
            top: 0;
            animation: anime infinite 1s;
        }

        @keyframes anime {
            0% {
                left: 0;
                top: 0;
            }

            20% {
                left: 100%;
                top: 100%;
            }

            40% {
                left: 0;
                top: 100%;
            }

            60% {
                left: 100%;
                top: 0;
            }

            80% {
                left: 100%;
                top: 0;
            }

            100% {
                left: 0;
                top: 0;
            }
        }
    </style>
</head>

<body>

    <section>
        <div class="container">
            <div class="face">
                <span class="eye1"></span>
                <span class="eye2"></span>
                <span class="smile"></span>
            </div>
        </div>
    </section>


    <section>
        <div class="container">
            <p>DVD</p>
        </div>
    </section>

    <!-- Tom and Jerry -->
    <section>
        <div class="container">

        </div>
    </section>

</body>

</html>
