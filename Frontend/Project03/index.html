<style>
    *,
    body {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
        max-block-size: 100vh;
        overflow: hidden;
    }

    body {
        max-width: 100%;
        border: solid;
        margin-inline: auto;
        height: 100vh;
        position: relative;
        background-color: black;
    }

    /* img.background {
        width: 100%;
    } */

    img.earth {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 20%;
        translate: -50% -50%;
        aspect-ratio: 1/1;
        z-index: 2;
        animation: rotation infinite 120s forwards;
        transform-origin: center;
    }

    @keyframes rotation {
        to {
            transform: rotate(0deg);

        }

        from {
            transform: rotate(3600deg);
        }
    }

    img.alienship {
        position: absolute;
        aspect-ratio: 1/1;
        z-index: 2;
        width: 10%;
        top: 50%;
        left: 20%;
        transform: translateY(-50%);
        animation: rotationOfEarth infinite linear 8s;
    }

    @keyframes rotationOfEarth {
        0% {
            width: 10%;
            left: 20%;
        }

        1% {
            z-index: 3;
        }

        50% {
            width: 20%;
            left: 70%;
        }

        99% {
            z-index: 0;
        }

        100% {
            width: 10%;
            left: 20%;
        }
    }

    .layer {
        position: absolute;
        z-index: 99;
        width: 100%;
        height: 100%;
        background-color: white;
        opacity: 0;
    }
</style>

<body>
    <div class="layer"></div>
    <!-- <img src="background.jpg" alt="" class="background"> -->

    <img src="earth-removebg-preview.png" alt="" class="earth">
    <img src="alienship-removebg-preview.png" alt="" class="alienship">
</body>
